house_clearance:
  pricing:
    intro: Typical costs based on property size and volume of items. Final price confirmed
      after free assessment.
    tiers:
    - label: Single Room / Light Load
      price: £150–£275
      detail: Small clearance, few items
    - label: Medium Property (2–3 bed)
      price: £350–£600
      detail: Full house clearance
    - label: Large Property (4+ bed)
      price: £600–£950
      detail: Including loft and garage
    - label: Single Bulky Items
      price: £60–£130
      detail: Per item (sofa, fridge, etc.)
    includes: Labour, loading, transport, disposal, and waste transfer documentation
    footer: Fixed pricing with no hidden charges. Call Mel for an exact quote.
    factors:
    - icon: 📦
      label: Volume & Weight
      detail: Larger volumes and heavier items require more time and resource
    - icon: 🚪
      label: Access Constraints
      detail: Narrow streets, parking limitations, stairs, or restricted access
    - icon: ⚠️
      label: Disposal Requirements
      detail: Specialist items or hazardous materials require separate handling
    - icon: ⏱️
      label: Urgency
      detail: Same-day or next-day requests may affect scheduling
  whats_included:
    title: What's Included in a House Clearance
    items:
    - label: Removal of furniture and contents
      detail: All rooms cleared — living areas, bedrooms, kitchen
    - label: Appliance removal
      detail: White goods and electrical items taken away
    - label: Document and valuables check
      detail: Basic check carried out before clearance begins
    - label: Sorting of contents
      detail: Reuse, donation, or recycling where possible
    - label: Licensed waste disposal
      detail: All waste removed via authorised channels
    - label: Waste transfer documentation
      detail: Compliance paperwork provided
    - label: Final sweep
      detail: Property left empty and swept through
    footer: All work by consistent in-house team. No subcontracting.
  faq:
    items:
    - q: How long does a house clearance take?
      a: A typical 2-3 bed property takes half a day. Larger properties or those with
        loft and garage contents may take a full day.
    - q: Do I need to be present during the clearance?
      a: No — key collection and remote access are both easily accommodated.
    - q: What happens to the items removed?
      a: Sorted for reuse, donation, recycling, or licensed disposal. We prioritise
        reuse over landfill.
    - q: Are you licensed and insured?
      a: Yes. Environment Agency registered waste carrier with full public liability
        insurance.
  process:
    steps:
    - n: 1
      label: Request a Quote
      detail: Call or message Mel with details of the property and contents.
    - n: 2
      label: Receive Fixed Price
      detail: A clear, no-obligation price confirmed after assessment.
    - n: 3
      label: Book a Date
      detail: Choose a convenient date — often available within 48 hours.
    - n: 4
      label: Clearance Carried Out
      detail: Mel and team clear the property efficiently and safely.
    - n: 5
      label: Items Sorted and Removed
      detail: Separated for reuse, recycling, or licensed disposal.
    - n: 6
      label: Property Left Ready
      detail: Empty and swept — ready for sale, rent, or handover.
  quick_qa:
    cards:
    - btn: Can You...?
      answer: Yes — we handle full house clearances from single rooms to entire properties
        including loft and garage contents.
    - btn: How Much?
      answer: From £150 for a light load up to £950 for a large property. Call Mel
        for a free, fixed-price quote with no hidden charges.
    - btn: When?
      answer: Often within 48 hours. Same-day quotes available. Call Mel to discuss
        your timeline.
  sensitive_clearances:
    variant: light
    title: Sensitive Clearance Handling
    intro: Some house clearances involve difficult circumstances. Mel handles every
      job with care and discretion, whatever the situation.
    items:
    - label: Care & Discretion
      detail: All items handled carefully and respectfully throughout.
    - label: Valuables Check
      detail: Basic check carried out before clearance begins.
    - label: Flexible Access
      detail: Key collection and remote access easily arranged.
    - label: No Judgement
      detail: Every situation treated with professionalism and respect.
    footer: Consistent in-house team ensuring continuity and discretion.
