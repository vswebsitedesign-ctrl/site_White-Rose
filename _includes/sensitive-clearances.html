{% assign sc = site.data.service_content[page.service].sensitive_clearances %}
<section style="padding: 30px 20px; background: #002D62; margin: 30px 0;">
    <div style="max-width: 1000px; margin: 0 auto; text-align: center;">
        <h2 style="color: #ffcc00; text-align: center; margin-bottom: 15px;">{{ sc.title }}</h2>
        <p style="text-align: center; margin-bottom: 25px; color: #ffffff; line-height: 1.5; font-size: 0.85rem;">{{ sc.intro }}</p>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; text-align: center;">
            {% for item in sc.items %}
            <div>
                <h3 style="color: #ffcc00; font-size: 1rem;">{{ item.label }}</h3>
                <p style="color: #ffffff; font-size: 0.85rem;">{{ item.detail }}</p>
            </div>
            {% endfor %}
        </div>
        <p style="margin-top: 20px; text-align: center; font-size: 0.8rem; color: #ffcc00;">{{ sc.footer }}</p>
    </div>
</section>
