{% assign loc = include.location_data %}

{% if loc and loc.lat and loc.lng %}
<section style="padding: 30px 20px; background: #f4f4f4;">
    <div style="max-width: 1000px; margin: 0 auto; text-align: center;">

        <h2 style="color: #002D62; margin-bottom: 20px;">
            Service Area: {{ loc.location }}
        </h2>

        <p style="margin-bottom: 20px; color: #555;">
            Coverage across {{ loc.location }} and surrounding areas.
        </p>

        <div style="border-radius: 8px; overflow: hidden; border: 1px solid #ddd;">
            <iframe
                width="100%"
                height="350"
                frameborder="0"
                style="border:0"
                referrerpolicy="no-referrer-when-downgrade"
                src="https://maps.google.com/maps?q={{ loc.lat }},{{ loc.lng }}&output=embed&z=13">
            </iframe>
        </div>

        <p style="margin-top: 15px; font-size: 0.9rem; color: #666;">
            Local coverage includes surrounding villages and nearby residential areas.
        </p>

    </div>
</section>
{% endif %}
